# O Render vai injetar a URL verdadeira aqui de forma segura:
spring.datasource.url=${DB_URL}

# Diz ao Hibernate para criar as tabelas automaticamente:
spring.jpa.hibernate.ddl-auto=update

# Opcional: Mostra no console do Render os comandos de banco que estão sendo executados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true